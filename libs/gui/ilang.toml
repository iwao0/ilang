# Capabilities (FFI / std bindings) — see crates/ilang-cli/src/manifest.rs.
capabilities = ["file", "os", "ffi", "net"]

[package]
name = "gui"

[deps]
wgpu29 = "../../bindings/wgpu29"

[[deps.gui_impl]]
path = "cocoa"
target = "macos"

[[deps.gui_impl]]
path = "win32"
target = "windows"

[[deps.gui_impl]]
path = "linux"
target = "linux"
